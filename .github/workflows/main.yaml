name: Deploy
on: workflow_dispatch

permissions:
  id-token: write
  contents: write
  checks: write
  packages: write
  pull-requests: write
  actions: write


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: [ '1.25' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Needed for gitversion

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v0.9.15
        with:
          versionSpec: '5.x'

      - name: Determine Version
        uses: gittools/actions/gitversion/execute@v0.9.15
        with:
          useConfigFile: true

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true  # Caches Go modules automatically

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build -v ./...

      - name: Create Tag
        if: github.ref_name == 'main'
        uses: negz/create-tag@v1
        with:
          version: v${{ env.GitVersion_SemVer }}
          message: 'Auto tagging version v${{ env.GitVersion_SemVer }}'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Linux x64
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w" \
            -o ./publish/jot-linux-x64/jot \
            .
          cd ./publish
          zip -r jot-linux-x64.zip jot-linux-x64
          cd ..

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.GitVersion_SemVer }}
          files: ./publish/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}